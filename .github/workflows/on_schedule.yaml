# Meant to be copied over as is in all ROCKs repositories with
# the name `on_schedule.yaml`.
#
# Runs once a month against `main` and on manual dispatch. Every rock in the
# repository (i.e. every directory containing a rockcraft.yaml) is built,
# scanned and tested. Publishing is skipped automatically (the reusable
# workflow gates publish on push events). On failure, a GitHub issue is
# opened (or commented on) per failing rock.
name: On Schedule

on:
  schedule:
    - cron: '0 4 1 * *'   # 1st of each month, 04:00 UTC
  workflow_dispatch:

jobs:
  on-schedule:
    uses: canonical/charmed-kubeflow-workflows/.github/workflows/get-all-rocks-and-build-test.yaml@chore/KF-8670-automatic-rock-build
    permissions:
      contents: read
      issues: write
    secrets: inherit
